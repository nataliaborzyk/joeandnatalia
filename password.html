<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Natalia & Joe · 18.09.2027</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Poppins:wght@300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #424f38;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
    }

    .wrap {
      text-align: center;
      padding: 40px 24px;
      animation: fadeUp 1s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .monogram {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(48px, 8vw, 72px);
      font-weight: 300;
      font-style: italic;
      color: #cdd9cc;
      opacity: 0.7;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .date {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #cdd9cc;
      opacity: 0.45;
      margin-bottom: 48px;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: rgba(205, 217, 204, 0.3);
      margin: 0 auto 40px;
    }

    .label {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #cdd9cc;
      opacity: 0.5;
      margin-bottom: 14px;
    }

    .input-wrap {
      position: relative;
      display: inline-block;
    }

    input[type="password"] {
      background: rgba(205, 217, 204, 0.06);
      border: 1px solid rgba(205, 217, 204, 0.2);
      border-radius: 2px;
      color: #cdd9cc;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.2em;
      padding: 13px 48px 13px 20px;
      width: 240px;
      outline: none;
      transition: border-color 0.25s;
      -webkit-appearance: none;
      text-align: center;
    }

    input[type="password"]::placeholder {
      opacity: 0.25;
      letter-spacing: 0.15em;
    }

    input[type="password"]:focus {
      border-color: rgba(205, 217, 204, 0.45);
    }

    input[type="password"].error {
      border-color: rgba(200, 100, 100, 0.5);
      animation: shake 0.35s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%       { transform: translateX(-6px); }
      75%       { transform: translateX(6px); }
    }

    .btn-enter {
      display: block;
      width: 240px;
      margin: 12px auto 0;
      background: rgba(205, 217, 204, 0.08);
      border: 1px solid rgba(205, 217, 204, 0.22);
      border-radius: 2px;
      color: #cdd9cc;
      font-family: 'Poppins', sans-serif;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      padding: 13px;
      cursor: pointer;
      transition: background 0.25s, border-color 0.25s;
    }

    .btn-enter:hover {
      background: rgba(205, 217, 204, 0.14);
      border-color: rgba(205, 217, 204, 0.4);
    }

    .error-msg {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: rgba(205, 150, 150, 0.7);
      margin-top: 14px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .error-msg.visible { opacity: 1; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="monogram">N &amp; J</div>
    <p class="date">18 · 09 · 2027</p>
    <div class="divider"></div>
    <p class="label">Wpisz hasło · Enter password</p>
    <input type="password" id="pwd" placeholder="••••••••" autocomplete="off" autofocus>
    <button class="btn-enter" onclick="check()">Wejdź · Enter</button>
    <p class="error-msg" id="err">Nieprawidłowe hasło · Incorrect password</p>
  </div>

  <script>
    const HASH = '7a9f3b2e1c8d4f6a0e5b9c3d7f2a8e1b4c6d9f3a2e7b5c8d1f4a6e9b3c7d2f';

    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function check() {
      const val = document.getElementById('pwd').value.trim();
      const hash = await sha256(val);
      const stored = sessionStorage.getItem('wauth');

      if (val.toUpperCase() === 'DINGO27') {
        sessionStorage.setItem('wauth', '1');
        window.location.href = 'index.html';
      } else {
        const input = document.getElementById('pwd');
        input.classList.add('error');
        document.getElementById('err').classList.add('visible');
        setTimeout(() => input.classList.remove('error'), 400);
        input.value = '';
        input.focus();
      }
    }

    document.getElementById('pwd').addEventListener('keydown', e => {
      if (e.key === 'Enter') check();
    });

    // If already authenticated, go straight to site
    if (sessionStorage.getItem('wauth') === '1') {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
